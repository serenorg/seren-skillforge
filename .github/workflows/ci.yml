name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: make lint PYTHON=python

      - name: Test
        run: make test PYTHON=python

      - name: Check generated drift
        run: make check-generated PYTHON=python

      - name: Online publisher validation
        if: ${{ secrets.SEREN_API_KEY != '' }}
        env:
          SEREN_API_KEY: ${{ secrets.SEREN_API_KEY }}
          SEREN_GATEWAY_URL: https://api.serendb.com
        run: |
          chmod +x scripts/ci/check_publishers_online.sh
          PYTHON=python bash scripts/ci/check_publishers_online.sh
