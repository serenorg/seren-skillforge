name: Enforce Polymarket CLI Runtime

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  enforce-polymarket-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block Inactive Polymarket Trading Publisher
        run: |
          set -euo pipefail
          if git grep -n 'polymarket-trading-serenai' -- \
            'artifacts/**/*.py' \
            'artifacts/**/*.json' \
            'artifacts/**/*.md' \
            '.github/workflows/*.yml'
          then
            echo "Inactive polymarket-trading-serenai publisher references are forbidden."
            exit 1
          fi

      - name: Restrict Direct Polymarket API URLs To Shared CLI And Config
        run: |
          set -euo pipefail
          tmp_matches="$(mktemp)"
          git grep -nE 'https://gamma-api\.polymarket\.com|https://clob\.polymarket\.com' -- \
            'artifacts/**/*.py' \
            'artifacts/**/*.json' \
            'artifacts/**/*.md' \
            > "${tmp_matches}" || true

          if [ -s "${tmp_matches}" ]; then
            if grep -Ev '^(artifacts/shared/polymarket_cli\.py|artifacts/polymarket-maker-rebate-bot/config\.example\.json|artifacts/polymarket/liquidity-paired-basis-maker/config\.example\.json):' "${tmp_matches}"; then
              echo "Direct Polymarket API URLs must only live in the shared Polymarket CLI or bot config examples."
              exit 1
            fi
          fi

      - name: Enforce CLI Defaults In Config
        run: |
          set -euo pipefail
          for config_path in \
            artifacts/polymarket-maker-rebate-bot/config.example.json \
            artifacts/polymarket/liquidity-paired-basis-maker/config.example.json
          do
            test -f "${config_path}"
            gamma_url="$(jq -r '.polymarket_cli.gamma_markets_url // empty' "${config_path}")"
            clob_url="$(jq -r '.polymarket_cli.clob_base_url // empty' "${config_path}")"
            [[ "${gamma_url}" == "https://gamma-api.polymarket.com/markets" ]]
            [[ "${clob_url}" == "https://clob.polymarket.com" ]]
          done

      - name: Enforce Shared CLI Usage In Runtime
        run: |
          set -euo pipefail
          test -f artifacts/shared/polymarket_cli.py
          grep -q 'from polymarket_cli import' artifacts/polymarket-maker-rebate-bot/scripts/agent.py
          grep -q 'from polymarket_cli import' artifacts/polymarket/liquidity-paired-basis-maker/scripts/agent.py
