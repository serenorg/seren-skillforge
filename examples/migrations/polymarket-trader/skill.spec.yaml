skill: polymarket-trader
description: Rank opportunities from prediction markets and output a dry-run trading plan.
triggers:
  - find polymarket opportunities
  - paper trade prediction markets
runtime:
  language: python
  entrypoint: scripts/agent.py
inputs:
  bankroll_usd:
    type: number
    min: 0
    default: 500
  top_n:
    type: integer
    min: 1
    max: 20
    default: 5
secrets:
  - SEREN_API_KEY
connectors:
  market_data:
    kind: seren_publisher
    publisher: polymarket-data
  model:
    kind: seren_publisher
    publisher: seren-models
state:
  positions:
    kind: sqlite
    file: state/positions.db
policies:
  dry_run_default: true
  idempotency_required: true
  max_daily_spend_usd: 25
  max_notional_usd: 500
  max_slippage_bps: 100
workflow:
  steps:
    - id: fetch_markets
      use: connector.market_data.get
      with:
        path: /markets
    - id: score_markets
      use: connector.model.post
      with:
        path: /evaluate
        body_from: fetch_markets
    - id: choose_top_markets
      use: transform.top_n
      with:
        n: "{top_n}"
        from_step: score_markets
    - id: create_plan
      use: transform.create_plan
      with:
        bankroll_usd: "{bankroll_usd}"
        from_step: choose_top_markets
tests:
  quick:
    - validates_budget_caps
  smoke:
    - ranks_opportunities_from_fixture
    - dry_run_has_no_live_orders
publish:
  org: polymarket
  slug: trader
metadata:
  category: trading
