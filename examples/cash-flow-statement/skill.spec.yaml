skill: cash-flow-statement
description: Generate standard cash flow statements from Wells Fargo transaction data, grouping into Operating, Investing, and Financing activities with net cash flow and burn rate per period.
triggers:
  - generate wells fargo cash flow statement
  - show cash flow by activity type
  - analyze cash burn rate and runway
runtime:
  language: python
  entrypoint: scripts/run.py
inputs:
  months:
    type: integer
    min: 1
    max: 24
    default: 12
  start:
    type: string
    description: Start date (YYYY-MM-DD). Overrides months if provided.
  end:
    type: string
    description: End date (YYYY-MM-DD). Defaults to today if start is provided.
  period:
    type: string
    description: Reporting period granularity.
    enum:
      - monthly
      - quarterly
      - annual
    default: monthly
  out:
    type: string
    default: artifacts/cash-flow-statement
  skip_persist:
    type: boolean
    default: false
connectors:
  serendb:
    kind: seren_publisher
    publisher: serendb
state:
  checkpoints:
    kind: sqlite
    file: artifacts/cash-flow-statement/state/checkpoint.json
policies:
  dry_run_default: false
  idempotency_required: true
workflow:
  steps:
    - id: resolve_serendb
      use: connector.serendb.connect
    - id: query_transactions
      use: connector.serendb.query
      with:
        tables:
          - wf_transactions
          - wf_txn_categories
    - id: classify_activities
      use: transform.classify_cashflow_activities
      with:
        from_step: query_transactions
    - id: aggregate_periods
      use: transform.aggregate_by_period
      with:
        period: "{period}"
        from_step: classify_activities
    - id: compute_net_cashflow
      use: transform.compute_net_cashflow
      with:
        from_step: aggregate_periods
    - id: render_report
      use: transform.render
      with:
        from_step: compute_net_cashflow
    - id: persist_cashflow
      use: connector.serendb.upsert
      with:
        tables:
          - wf_cashflow_runs
          - wf_cashflow_activities
          - wf_cashflow_snapshots
        from_step: compute_net_cashflow
tests:
  quick:
    - validates_period_enum
    - validates_date_range
  smoke:
    - classifies_activities_from_fixture
    - computes_net_cashflow_correctly
    - detects_burn_rate_from_fixture
publish:
  org: seren-skills
  slug: cash-flow-statement
metadata:
  category: finance
  depends_on: bank-statement-processing
