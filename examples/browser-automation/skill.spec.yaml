skill: browser-automation
description: Automate browser interactions and extract structured webpage content.
triggers:
  - take a screenshot
  - scrape page data
runtime:
  language: python
  entrypoint: scripts/agent.py
inputs:
  url:
    type: string
    description: Target URL to automate.
  screenshot_name:
    type: string
    default: capture.png
secrets:
  - SEREN_API_KEY
connectors:
  playwright:
    kind: seren_publisher
    publisher: playwright
policies:
  dry_run_default: true
  idempotency_required: true
workflow:
  steps:
    - id: navigate
      use: connector.playwright.navigate
      with:
        url: "{url}"
    - id: capture
      use: connector.playwright.screenshot
      with:
        name: "{screenshot_name}"
tests:
  quick:
    - validates_required_url
  smoke:
    - captures_fixture_page
publish:
  org: seren
  slug: browser-automation
metadata:
  category: automation
